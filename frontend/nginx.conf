server {
    listen 80;

    # Aumentamos el tamaño máximo de subida por seguridad
    client_max_body_size 100M;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:3000;
        
        # --- SOLUCIÓN AL ERROR DE GOOGLE DRIVE ---
        # Le decimos a Nginx que espere hasta 15 minutos (900 segundos) 
        # a que el backend comprima y suba el mundo sin cortar la conexión.
        proxy_read_timeout 900;
        proxy_connect_timeout 900;
        proxy_send_timeout 900;
    }

    location /socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}