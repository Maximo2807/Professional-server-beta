<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Servers | Minecraft Panel</title>
    <link rel="icon" type="image/x-icon" href="./assets/img/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0a0a0a; color: white; overflow-x: hidden; overflow-y: scroll; min-height: 100vh; }
        .hidden { display: none !important; }

        .contenedor-principal { display: flex; height: 100vh; width: 100%; }
        .mitad-video { width: 55%; position: relative; background: #000; overflow: hidden; }
        .video-fondo { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; position: absolute; top: 0; left: 0; }
        .filtro-oscuro { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, rgba(0,0,0,0) 60%, rgba(10,10,10,1) 100%); z-index: 1; }
        
        .mitad-login { width: 45%; display: flex; justify-content: center; align-items: center; background: #0a0a0a; padding: 40px; z-index: 2; }
        .caja-login { width: 100%; max-width: 420px; z-index: 2; display: flex; flex-direction: column; align-items: center; }
        
        .titulo-container { text-align: center; margin-bottom: 10px; display: flex; flex-direction: column; align-items: center;}
        .titulo-pro { font-family: 'Press Start 2P', cursive; font-size: 24px; color: #4CAF50; display: block; margin-bottom: 8px;}
        .titulo-servers { font-family: 'Press Start 2P', cursive; font-size: 24px; color: white; display: block;}
        
        .contenedor-social { display: flex; justify-content: center; gap: 20px; margin: 25px 0; width: 100%; }
        .btn-circular { width: 52px; height: 52px; border-radius: 50%; border: 1px solid #333; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; background: #161616; }
        .btn-circular:hover { transform: translateY(-3px); border-color: #4CAF50; box-shadow: 0 5px 15px rgba(76,175,80,0.2); }
        .btn-circular img { width: 26px; height: 26px; pointer-events: none;}
        .btn-circular img.invertir-blanco { filter: invert(1); }

        .separador { text-align: center; margin: 20px 0; position: relative; width: 100%; }
        .separador span { background: #0a0a0a; padding: 0 15px; color: #555; font-size: 11px; text-transform: uppercase; position: relative; z-index: 2; }
        .separador::before { content: ""; position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: #222; z-index: 1; }

        .grupo-input { margin-bottom: 15px; width: 100%; }
        .grupo-input label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .grupo-input input, .grupo-input select { width: 100%; padding: 12px; background: #161616; border: 1px solid #222; border-radius: 8px; color: white; outline: none; transition: 0.3s;}
        .grupo-input input:focus, .grupo-input select:focus { border-color: #4CAF50; background: #1a1a1a;}
        
        .fila-doble { display: flex; gap: 10px; width: 100%; }
        .btn-ingresar { width: 100%; padding: 14px; background: #4CAF50; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; text-transform: uppercase; color: white; }
        .btn-ingresar:hover { background: #45a049; transform: scale(1.02); }

        .enlace-interactivo { color: #4CAF50; cursor: pointer; font-weight: 600; text-decoration: none; }
        .enlace-interactivo:hover { text-decoration: underline; }

        .dashboard-body { 
            position: relative;
            width: 100%; 
            min-height: 100vh;
            background: url('./assets/img/dashboard-bg.jpeg') center/cover no-repeat fixed;
            display: flex;
            flex-direction: column;
            padding-bottom: 110px; 
        }
        .db-bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); 
            backdrop-filter: blur(8px); 
            z-index: 0;
        }

        .content-panel { 
            background: rgba(20, 20, 20, 0.9); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 15px; 
            padding: 25px;
            position: relative;
            z-index: 10;
        }

        .amd-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 20px;
            width: 100%;
        }
        
        .amd-panel {
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .amd-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        
        .amd-panel-title {
            font-size: 14px;
            font-weight: 600;
            color: #ddd;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .amd-panel-value {
            font-size: 28px;
            font-weight: bold;
            font-family: monospace;
        }

        .chart-container {
            flex-grow: 1;
            position: relative;
            height: 150px;
            width: 100%;
        }

        .btn-power { padding: 12px 15px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; color: white; border: none; display: flex; align-items: center; gap: 8px; justify-content: center; width: 100%; font-size: 13px;}
        .btn-power:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-start { background-color: #4CAF50; }
        .btn-start:hover:not(:disabled) { background-color: #45a049; transform: scale(1.03); }
        .btn-restart { background-color: #3b82f6; }
        .btn-restart:hover:not(:disabled) { background-color: #2563eb; transform: scale(1.03); }
        .btn-stop { background-color: #ef4444; }
        .btn-stop:hover:not(:disabled) { background-color: #dc2626; transform: scale(1.03); }

        .plan-badge { background-color: rgba(76, 175, 80, 0.2); color: #4CAF50; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; border: 1px solid rgba(76, 175, 80, 0.5); display: inline-block; margin-top: 5px;}
        .btn-planes { background: transparent; border: 1px solid #4CAF50; color: #4CAF50; padding: 6px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; transition: 0.3s; margin-top: 8px; font-weight: bold; text-transform: uppercase;}
        .btn-planes:hover { background: #4CAF50; color: white; }

        .navigation-container { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 1000px; }
        .navigation { display: flex; justify-content: space-between; background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(15px); border-radius: 20px; padding: 5px 15px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .navigation a { padding: 12px 10px; color: #888; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .navigation a.active { color: #4CAF50; transform: translateY(-3px); }
        .navigation a span.title { font-size: 9px; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

        .console-textarea, .file-editor { width:100%; height:400px; background-color:#000; border:1px solid #333; color:#0f0; font-family: monospace; font-size:13px; resize:none; border-radius:8px; padding: 10px; }
        .player-card { background:rgba(31, 41, 55, 0.8); border:1px solid #374151; border-radius:1rem; padding:1rem; text-align:center; }
        .player-avatar { width:80px; height:80px; border-radius:50%; margin:0 auto .5rem; border:3px solid #4CAF50; }
        .file-tree { height: 400px; overflow-y: auto; background-color: #111; border-radius: 8px; padding: 10px; border: 1px solid #333; }
        .file-tree-item { cursor: pointer; padding: 8px; border-radius: 4px; display: flex; align-items: center; gap: 8px; transition: 0.2s;}
        .file-tree-item:hover { background-color: #222; }

        .mod-pills-tab { display: flex; gap: 10px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; flex-wrap: wrap;}
        .mod-pill { padding: 8px 16px; border-radius: 20px; background: #222; border: 1px solid #444; color: #aaa; font-size: 12px; cursor: pointer; transition: 0.2s; text-transform: uppercase;}
        .mod-pill.active { background: #4CAF50; color: white; border-color: #4CAF50; font-weight: bold; }

        .search-mod-input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px 15px; border-radius: 8px; width: 100%; font-size: 14px; outline: none; }
        .search-mod-input:focus { border-color: #4CAF50; }
        .mod-item { display: flex; justify-content: space-between; align-items: center; background: rgba(30,30,30,0.7); border: 1px solid #333; border-radius: 10px; padding: 15px; margin-bottom: 10px; transition: 0.2s;}
        .mod-item:hover { border-color: #4CAF50; background: rgba(40,40,40,0.9); }
        
        .permissions-table { width: 100%; border-collapse: collapse; font-size: 12px; text-transform: uppercase; color: #ccc; }
        .permissions-table th { padding: 12px 10px; border-bottom: 2px solid #333; color: #888; letter-spacing: 1px; }
        .permissions-table td { padding: 12px 10px; border-bottom: 1px solid #222; }
        .perm-check { appearance: none; width: 18px; height: 18px; background: #222; border: 2px solid #555; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .perm-check:checked { background: #4CAF50; border-color: #4CAF50; }
        
        .variant-pill { border: 1px solid #555; background: #222; color: #ccc; border-radius: 5px; padding: 6px 12px; text-transform: uppercase; font-size: 11px; cursor: pointer; transition: 0.2s;}
        .variant-pill:hover { background: #333; }
        .variant-pill.active { border-color: #4CAF50; background: #1a1a1a; color: white; font-weight: bold; box-shadow: 0 0 8px rgba(76, 175, 80, 0.3); }
        .cloud-badge { display: flex; align-items: center; gap: 8px; background: #222; border: 1px solid #444; padding: 12px; border-radius: 8px; flex: 1;}
    </style>
</head>
<body>

    <div id="auth-container" class="contenedor-principal">
        <div class="mitad-video">
            <div class="filtro-oscuro"></div>
            <video autoplay loop muted playsinline class="video-fondo">
                <source src="./assets/videos/login-animation.mp4" type="video/mp4">
            </video>
        </div>

        <div class="mitad-login">
            <div class="caja-login">
                <div class="titulo-container">
                    <div class="flex items-center justify-center gap-4 mb-5">
                        <img src="./assets/img/favicon.ico" alt="Tu Logo" class="w-10 h-10 object-contain drop-shadow-[0_0_12px_rgba(76,175,80,0.5)] transition-transform hover:scale-110" onerror="this.src='./assets/img/logo-minecraft.ico'">
                        <i data-feather="x" class="text-gray-600 w-4 h-4"></i>
                        <img src="./assets/img/logo-minecraft.ico" alt="Minecraft" class="w-10 h-10 object-contain drop-shadow-[0_0_12px_rgba(255,255,255,0.2)] transition-transform hover:scale-110">
                        <i data-feather="x" class="text-gray-600 w-4 h-4"></i>
                        <img src="./assets/img/modrinth.ico" alt="Modrinth" class="w-10 h-10 rounded-xl object-contain drop-shadow-[0_0_12px_rgba(27,217,106,0.5)] transition-transform hover:scale-110" onerror="this.src='./assets/img/logo-minecraft.ico'">
                    </div>
                    <span class="titulo-pro">Professional</span>
                    <span class="titulo-servers">Servers</span>
                </div>
                
                <p style="text-align: center; color: #666; font-size: 13px; margin-bottom: 10px;">Gestión de infraestructura de alto rendimiento</p>

                <div class="contenedor-social">
                    <div class="btn-circular" id="btn-google">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/google/google-original.svg" alt="Google">
                    </div>
                    <div class="btn-circular" id="btn-github">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/github/github-original.svg" alt="GitHub" class="invertir-blanco">
                    </div>
                    <div class="btn-circular" id="btn-ms">
                        <img src="./assets/img/microsoft.ico" alt="Microsoft" style="width: 24px; height: 24px;">
                    </div>
                </div>

                <div class="separador"><span>O usar credenciales directas</span></div>

                <div id="login-box" class="w-full">
                    <form id="login-form">
                        <div class="grupo-input">
                            <label>Email / Teléfono</label>
                            <input type="text" name="email" placeholder="correo@ejemplo.com o +549..." required>
                        </div>
                        <div class="grupo-input">
                            <label>Contraseña</label>
                            <input type="password" name="password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn-ingresar">INGRESAR AL SISTEMA</button>
                        <p style="text-align:center; font-size:12px; margin-top:15px; color:#888;">
                            ¿Nuevo aquí? <a id="show-register" class="enlace-interactivo">Crear cuenta profesional</a>
                        </p>
                    </form>
                </div>

                <div id="register-box" class="hidden w-full">
                    <form id="register-form">
                        <div class="fila-doble">
                            <div class="grupo-input" style="flex:1">
                                <label>Nombre</label>
                                <input type="text" name="nombre" placeholder="Nombre" required>
                            </div>
                            <div class="grupo-input" style="flex:1">
                                <label>Apellido</label>
                                <input type="text" name="apellido" placeholder="Apellido" required>
                            </div>
                        </div>
                        <div class="fila-doble">
                            <div class="grupo-input" style="flex:1">
                                <label>Nacimiento</label>
                                <input type="date" name="dob" required>
                            </div>
                            <div class="grupo-input" style="flex:1">
                                <label>País</label>
                                <select name="pais">
                                    <option value="AR">Argentina</option>
                                    <option value="CL">Chile</option>
                                    <option value="MX">México</option>
                                    <option value="ES">España</option>
                                    <option value="US">USA</option>
                                </select>
                            </div>
                        </div>
                        <div class="grupo-input">
                            <label>Teléfono (Opcional)</label>
                            <input type="tel" name="phone" placeholder="+54 9 11 ...">
                        </div>
                        <div class="grupo-input">
                            <label>Email / Teléfono</label>
                            <input type="text" name="email" placeholder="correo@ejemplo.com o +549..." required>
                        </div>
                        <div class="grupo-input">
                            <label>Contraseña Segura</label>
                            <input type="password" name="password" placeholder="Mínimo 6 caracteres" required minlength="6">
                        </div>
                        <button type="submit" class="btn-ingresar">CREAR CUENTA PROFESIONAL</button>
                        <p style="text-align:center; font-size:12px; margin-top:15px; color:#888;">
                            ¿Ya tienes cuenta? <a id="show-login" class="enlace-interactivo">Iniciar Sesión</a>
                        </p>
                    </form>
                </div>
            </div>
            
            <p style="position: absolute; bottom: 20px; right: 20px; font-size: 10px; color: #333;">PROFESSIONAL SERVERS V2.5 BETA | @MAXPRO</p>
        </div>
    </div>

    <div id="main-dashboard" class="dashboard-body hidden"></div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, GithubAuthProvider, OAuthProvider, signInWithPopup, updateProfile, onAuthStateChanged, signOut, linkWithPopup, unlink } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg-wvhB7iaHOF5UOSsOOOz6le1ZutVmMM",
            authDomain: "proffesional-server.firebaseapp.com",
            projectId: "proffesional-server",
            storageBucket: "proffesional-server.firebasestorage.app",
            messagingSenderId: "833822850667",
            appId: "1:833822850667:web:3c03219c6822116edbfb2e",
            measurementId: "G-8SZ528Y5NZ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        const providerGoogle = new GoogleAuthProvider();
        const providerGithub = new GithubAuthProvider();
        const providerMicrosoft = new OAuthProvider('microsoft.com');

        document.addEventListener('DOMContentLoaded', () => {
            feather.replace();

            const API_URL = "http://localhost:3000"; 
            const authContainer = document.getElementById('auth-container');
            const dashboard = document.getElementById('main-dashboard');

            document.getElementById('show-register')?.addEventListener('click', (e) => {
                e.preventDefault();
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('register-box').classList.remove('hidden');
            });
            document.getElementById('show-login')?.addEventListener('click', (e) => {
                e.preventDefault();
                document.getElementById('register-box').classList.add('hidden');
                document.getElementById('login-box').classList.remove('hidden');
            });

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    // Preguntamos al backend si este usuario ya tiene un proyecto
                    try {
                        const res = await fetch(`${API_URL}/api/project/check?uid=${user.uid}`);
                        if(res.ok) {
                            const data = await res.json();
                            if (data.exists) {
                                entrarAlPanel(); // Si tiene, entra normal
                            } else {
                                window.location.href = 'create.html'; // Si NO tiene, lo mandamos a crear
                            }
                        } else {
                            entrarAlPanel(); // Si el backend no responde, entra por las dudas
                        }
                    } catch (e) {
                        entrarAlPanel(); // Prevención de errores
                    }
                } else {
                    authContainer.classList.remove('hidden');
                    dashboard.classList.add('hidden');
                }
            });

            document.getElementById('btn-google').addEventListener('click', async () => {
                try {
                    const res = await signInWithPopup(auth, providerGoogle);
                    alert(`Acceso concedido. Bienvenido, ${res.user.displayName || res.user.email.split('@')[0]}.`);
                } catch (e) { alert("Error al conectar con Google: " + e.message); }
            });
            document.getElementById('btn-github').addEventListener('click', async () => {
                try {
                    await signInWithPopup(auth, providerGithub);
                    alert(`Acceso concedido mediante GitHub.`);
                } catch (e) { alert("Error al conectar con GitHub: " + e.message); }
            });
            document.getElementById('btn-ms').addEventListener('click', async () => {
                try {
                    await signInWithPopup(auth, providerMicrosoft);
                    alert(`Acceso concedido mediante Microsoft.`);
                } catch (e) { alert("Error al conectar con Microsoft: " + e.message); }
            });

            document.getElementById('register-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const f = e.target;
                let idIngresado = f.email.value.trim();
                if (!idIngresado.includes('@')) idIngresado = idIngresado.replace(/[^0-9+]/g, '') + "@proservers.com";

                try {
                    const cred = await createUserWithEmailAndPassword(auth, idIngresado, f.password.value);
                    await updateProfile(cred.user, { displayName: `${f.nombre.value} ${f.apellido.value}` });
                    alert(`Cuenta creada con éxito para ${f.nombre.value}. ¡Bienvenido!`);
                } catch (err) { alert("Error al registrar: " + err.message); }
            });

            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                let idIngresado = e.target.email.value.trim();
                if (!idIngresado.includes('@')) idIngresado = idIngresado.replace(/[^0-9+]/g, '') + "@proservers.com";
                try {
                    await signInWithEmailAndPassword(auth, idIngresado, e.target.password.value);
                } catch (err) { alert("Credenciales incorrectas. Verifica tu usuario y clave."); }
            });

            function entrarAlPanel() {
                authContainer.classList.add('hidden');
                dashboard.classList.remove('hidden');
                populateDashboard(dashboard);
            }

            function populateDashboard(element) {
                element.innerHTML = `
                    <div class="db-bg-overlay"></div>
                    <div class="p-8 relative z-10 w-full max-w-[1400px] mx-auto">
                        <div class="flex justify-between items-center mb-8 bg-[#0f0f0f] p-6 rounded-xl border border-[#333] shadow-lg">
                            <div>
                                <h2 class="text-xs uppercase tracking-widest text-green-500 font-bold mb-1">Panel de Control</h2>
                                <h1 class="text-3xl font-bold font-['Cinzel'] tracking-wide">Professional Servers</h1>
                            </div>
                            <div class="text-right">
                                <p class="text-xs text-gray-400 uppercase tracking-widest">Sesión Activa</p>
                                <p class="font-bold text-xl text-white">${auth.currentUser ? auth.currentUser.displayName : 'Administrador'}</p>
                                <div class="flex items-center justify-end gap-3 mt-2">
                                    <span class="plan-badge">Plan Free</span>
                                    <button class="btn-planes" onclick="window.location.href='planes.html'">Ver Planes</button>
                                </div>
                            </div>
                        </div>
                        
                        <main class="w-full">
                            <div id="home-panel" class="w-full"></div>
                            <div id="console-panel" class="content-panel hidden"></div>
                            <div id="players-panel" class="content-panel hidden"></div>
                            <div id="files-panel" class="content-panel hidden"></div>
                            <div id="mods-panel" class="content-panel hidden"></div>
                            <div id="nube-panel" class="content-panel hidden"></div>
                            <div id="settings-panel" class="content-panel hidden"></div>
                            <div id="compartidos-panel" class="content-panel hidden"></div>
                        </main>
                    </div>

                    <div class="navigation-container">
                        <nav class="navigation">
                            <a data-panel="home-panel" class="active"><i data-feather="activity"></i><span class="title">Rendimiento</span></a>
                            <a data-panel="console-panel"><i data-feather="terminal"></i><span class="title">Consola</span></a>
                            <a data-panel="players-panel"><i data-feather="users"></i><span class="title">Staff</span></a>
                            <a data-panel="files-panel"><i data-feather="folder"></i><span class="title">Archivos</span></a>
                            <a data-panel="mods-panel"><i data-feather="package"></i><span class="title">Mods & APIS</span></a>
                            <a data-panel="nube-panel"><i data-feather="cloud"></i><span class="title">Copias Nube</span></a>
                            <a data-panel="settings-panel"><i data-feather="settings"></i><span class="title">Ajustes</span></a>
                            <a data-panel="compartidos-panel"><i data-feather="share-2"></i><span class="title">Compartidos</span></a>
                            <a id="logout-btn"><i data-feather="log-out"></i><span class="title">Salir</span></a>

            function updateProviderUI() {
                const user = auth.currentUser;
                if(!user) return;
                
                const linkedProviders = user.providerData.map(p => p.providerId);
                
                const btnGdrive = document.getElementById('btn-gdrive');
                if (btnGdrive) {
                    if (linkedProviders.includes('google.com')) {
                        btnGdrive.innerText = 'Desvincular';
                        btnGdrive.className = 'text-xs text-red-500 font-bold hover:underline';
                        btnGdrive.onclick = () => unlinkProvider('google.com');
                    } else {
                        btnGdrive.innerText = 'Vincular y Dar Permiso';
                        btnGdrive.className = 'text-xs text-green-400 hover:underline';
                        btnGdrive.onclick = async () => {
                            const p = new GoogleAuthProvider();
                            p.addScope('https://www.googleapis.com/auth/drive.file');
                            await linkProvider(p, 'Google Drive');
                        };
                    }
                }

                const btnOneDrive = document.getElementById('btn-onedrive');
                if (btnOneDrive) {
                    if (linkedProviders.includes('microsoft.com')) {
                        btnOneDrive.innerText = 'Desvincular';
                        btnOneDrive.className = 'text-xs text-red-500 font-bold hover:underline';

                            const p = new OAuthProvider('microsoft.com');
                            p.addScope('Files.ReadWrite');
                            await linkProvider(p, 'OneDrive');
                        };
                    }
                }
            }

            async function linkProvider(provider, name) {
                try {
                    const result = await linkWithPopup(auth.currentUser, provider);
                    const credential = provider.providerId === 'google.com' ? GoogleAuthProvider.credentialFromResult(result) : OAuthProvider.credentialFromResult(result);
                    if (credential && credential.accessToken) {
                        localStorage.setItem(provider.providerId + '_token', credential.accessToken);
                    }
                    alert(`¡${name} vinculado correctamente! Ya puedes guardar tus mundos.`);
                    updateProviderUI(); 
                } catch (e) {
                    if (e.code === 'auth/credential-already-in-use' || e.code === 'auth/provider-already-linked') {
                        alert(`¡La cuenta de ${name} ya se encuentra vinculada y lista para usarse!`);
                        updateProviderUI();
                    } else if (e.code === 'auth/requires-recent-login') {
                        alert('Por seguridad, vuelve a iniciar sesión para vincular/desvincular cuentas.');
                    } else {
                        alert('Error al vincular: ' + e.message);
                    }
                }
            }

            async function unlinkProvider(providerId) {
                if(!confirm(`¿Estás seguro de que quieres desvincular este servicio en la nube?`)) return;
                try {
                    await unlink(auth.currentUser, providerId);
                    localStorage.removeItem(providerId + '_token');
                    updateProviderUI();
                } catch(e) {
                    if (e.code === 'auth/no-such-provider') updateProviderUI();
                    else alert('Error al desvincular.');
                }
            }

                    div.className = "backup-item flex flex-col bg-[#1a1a1a] p-4 rounded-lg border border-[#333] shadow-md mb-2";

            window.removeBackup = (id) => {
                let saved = JSON.parse(localStorage.getItem('saved_backups') || '[]');
                saved = saved.filter(b => b.id !== id);
                localStorage.setItem('saved_backups', JSON.stringify(saved));
                if(saved.length === 0) document.getElementById('backup-list').innerHTML = '<div class="text-center text-gray-600 text-sm py-4">No hay copias de seguridad creadas aún.</div>';
            };

            window.createBackup = async (providerName) => {
                const isGoogle = providerName === 'gdrive';
                const tokenKey = isGoogle ? 'google.com_token' : 'microsoft.com_token';
                const token = localStorage.getItem(tokenKey);
                const providerText = isGoogle ? 'Google Drive' : 'OneDrive';
                
                if (!token) {
                    alert(`Por favor, "Vincular y Dar Permisos" a tu cuenta de ${providerText} antes de hacer un backup.`);
                    return;
                }

                const list = document.getElementById('backup-list');
                if(list.innerText.includes('No hay copias')) list.innerHTML = '';
                
                const backupId = Date.now().toString();
                const div = document.createElement('div');
                div.id = `backup-card-${backupId}`;
                div.className = "backup-item flex flex-col bg-[#1a1a1a] p-4 rounded-lg border border-[#333] shadow-md mb-2";
                
                div.innerHTML = `
                    <div class="flex justify-between items-start w-full">
                        <div class="flex items-center gap-3">
                            <i data-feather="loader" id="icon-${backupId}" class="text-indigo-400 w-6 h-6 animate-spin"></i>
                            <div>
                                <p class="text-sm text-white font-bold" id="title-${backupId}">Preparando copia en ${providerText}...</p>
                                <p class="text-xs text-yellow-400 mt-1" id="status-${backupId}">Comprimiendo y conectando...</p>
                            </div>
                        </div>
                        <button onclick="this.closest('.backup-item').remove()" class="text-red-500 hover:text-red-400 p-2"><i data-feather="trash-2" class="w-4 h-4"></i></button>
                    </div>
                    <div id="progress-container-${backupId}" class="w-full mt-4">
                        <div class="flex justify-between text-xs text-gray-400 mb-1">
                            <span>Progreso de subida</span>
                            <span id="pct-${backupId}">0%</span>
                        </div>
                        <div class="w-full bg-[#222] rounded-full h-2">
                            <div id="bar-${backupId}" class="bg-indigo-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>
                `;
                list.prepend(div);
                feather.replace();

                let pct = 0;
                const interval = setInterval(() => {
                    if (pct < 90) {
                        pct += Math.floor(Math.random() * 8) + 1;
                        if(pct > 90) pct = 90;
                        document.getElementById(`bar-${backupId}`).style.width = pct + '%';
                        document.getElementById(`pct-${backupId}`).innerText = pct + '%';
                    }
                }, 1500);

                try {
                    const endpoint = isGoogle ? '/api/backup/gdrive' : '/api/backup/onedrive';
                    const res = await fetch(`${API_URL}${endpoint}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token })
                    });
                    const data = await res.json();
                    
                    clearInterval(interval);
                    
                    if (data.success) {
                        document.getElementById(`bar-${backupId}`).style.width = '100%';
                        document.getElementById(`pct-${backupId}`).innerText = '100%';
                        document.getElementById(`bar-${backupId}`).classList.replace('bg-indigo-500', 'bg-green-500');
                        
                        const timeStr = new Date().toLocaleTimeString();
                        document.getElementById(`icon-${backupId}`).outerHTML = `<i data-feather="check-circle" class="text-green-500 w-6 h-6"></i>`;
                        document.getElementById(`title-${backupId}`).innerText = data.name;
                        document.getElementById(`status-${backupId}`).innerText = `Subido a ${providerText} - ${timeStr}`;
                        document.getElementById(`status-${backupId}`).classList.replace('text-yellow-400', 'text-green-400');
                        
                        setTimeout(() => { document.getElementById(`progress-container-${backupId}`).style.display = 'none'; }, 2000);
                        feather.replace();

                        // Guardamos en la memoria para que no se borre al dar F5
                        const saved = JSON.parse(localStorage.getItem('saved_backups') || '[]');
                        saved.unshift({ id: backupId, name: data.name, provider: providerText, time: timeStr });
                        localStorage.setItem('saved_backups', JSON.stringify(saved));

                    } else { throw new Error(data.error); }
                } catch(e) {
                    clearInterval(interval);
                    document.getElementById(`progress-container-${backupId}`).style.display = 'none';
                    document.getElementById(`icon-${backupId}`).outerHTML = `<i data-feather="alert-triangle" class="text-red-500 w-6 h-6"></i>`;
                    document.getElementById(`title-${backupId}`).innerText = 'Error al crear la copia en la nube';
                    document.getElementById(`status-${backupId}`).innerText = e.message;
                    document.getElementById(`status-${backupId}`).classList.replace('text-yellow-400', 'text-red-500');
                    feather.replace();
                }
            };

            function initCharts() {
                if (ramChart) { ramChart.destroy(); }
                if (cpuChart) { cpuChart.destroy(); }

                const ramCtx = document.getElementById('ramChart');
                const cpuCtx = document.getElementById('cpuChart');
                if(!ramCtx || !cpuCtx) return;

                const commonOptions = {
                    responsive: true, maintainAspectRatio: false, animation: { duration: 0 }, elements: { point: { radius: 0 } }, 
                    scales: { x: { display: false }, y: { display: true, min: 0, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#666', font: {size: 10} } } },
                    plugins: { legend: { display: false } }
                };

                ramChart = new Chart(ramCtx, {
                    type: 'line',
                    data: { labels: Array(maxDataPoints).fill(''), datasets: [{ data: Array(maxDataPoints).fill(0), borderColor: '#4CAF50', backgroundColor: 'rgba(76, 175, 80, 0.2)', borderWidth: 2, fill: true, tension: 0.4 }] },
                    options: commonOptions
                });

                cpuChart = new Chart(cpuCtx, {
                    type: 'line',
                    data: { labels: Array(maxDataPoints).fill(''), datasets: [{ data: Array(maxDataPoints).fill(0), borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.2)', borderWidth: 2, fill: true, tension: 0.4 }] },
                    options: { ...commonOptions, scales: { y: { ...commonOptions.scales.y, max: 100 } } }
                });
            }

            async function checkStatus() {
                try {
                    const res = await fetch(`${API_URL}/api/server/status`);
                    const data = await res.json();
                    const isOn = data.status === 'on';
                    
                    const sText = document.getElementById('status-text');
                    if (sText) {
                        sText.innerText = isOn ? 'ONLINE' : 'OFFLINE';
                        sText.className = isOn ? 'text-sm font-bold text-green-500 uppercase tracking-widest' : 'text-sm font-bold text-red-500 uppercase tracking-widest';
                    }

                    if (document.getElementById('btn-start')) document.getElementById('btn-start').disabled = isOn;         
                    if (document.getElementById('btn-restart')) document.getElementById('btn-restart').disabled = !isOn;    
                    if (document.getElementById('btn-stop')) document.getElementById('btn-stop').disabled = !isOn;          

                    if (isOn) {
                        const statRes = await fetch(`${API_URL}/api/server/stats`);
                        const statData = await statRes.json();
                        
                        if (document.getElementById('stat-cpu-value')) document.getElementById('stat-cpu-value').innerText = statData.cpu;
                        if (document.getElementById('stat-ram-value')) document.getElementById('stat-ram-value').innerText = `${(parseFloat(statData.ram) / 1024).toFixed(2)} GB / 8.00 GB`;

                        if (document.getElementById('stat-disk-header')) {
                            let diskNum = parseInt(statData.disk) || 0;
                            document.getElementById('stat-disk-header').innerText = diskNum + '% USADO';
                            if (document.getElementById('stat-disk-value')) document.getElementById('stat-disk-value').innerText = diskNum + '%';
                            if (document.getElementById('stat-disk-bar')) document.getElementById('stat-disk-bar').style.width = diskNum + '%';
                        }

                        if(ramChart && cpuChart) {
                            ramChart.data.datasets[0].data.shift(); ramChart.data.datasets[0].data.push(parseFloat(statData.ram)); ramChart.update();
                            cpuChart.data.datasets[0].data.shift(); cpuChart.data.datasets[0].data.push(parseFloat(statData.cpu)); cpuChart.update();
                        }
                    } else {
                        if (document.getElementById('stat-cpu-value')) document.getElementById('stat-cpu-value').innerText = '0%';
                        if (document.getElementById('stat-ram-value')) document.getElementById('stat-ram-value').innerText = '0.00 GB / 8.00 GB';
                        if (document.getElementById('stat-disk-header')) {
                            document.getElementById('stat-disk-header').innerText = '0% USADO';
                            if(document.getElementById('stat-disk-value')) document.getElementById('stat-disk-value').innerText = '0%';
                            if(document.getElementById('stat-disk-bar')) document.getElementById('stat-disk-bar').style.width = '0%';
                        }
                        if(ramChart && cpuChart) {
                            ramChart.data.datasets[0].data.shift(); ramChart.data.datasets[0].data.push(0); ramChart.update();
                            cpuChart.data.datasets[0].data.shift(); cpuChart.data.datasets[0].data.push(0); cpuChart.update();
                        }
                    }
                } catch(e){}
            }

            window.actionServer = async (action) => {
                document.getElementById('btn-start').disabled = true;
                document.getElementById('btn-restart').disabled = true;
                document.getElementById('btn-stop').disabled = true;
                
                document.getElementById('status-text').innerText = 'PROCESANDO...';
                document.getElementById('status-text').className = 'text-sm font-bold text-yellow-500 uppercase tracking-widest';

                await fetch(`${API_URL}/api/server/${action}`, { method: 'POST' });
                setTimeout(checkStatus, 3000);
            };

            function connectConsole() {
                const out = document.getElementById('console-out');
                if(!out) return;
                socket = io(API_URL);
                socket.on('log', (data) => {
                    out.value += data.replace(/\u001b\[[0-9;]*m/g, '');
                    out.scrollTop = out.scrollHeight;
                });
            }

            function sendConsoleCommand(e) {
                e.preventDefault();
                const input = document.getElementById('cmd-in');
                if (input && input.value) {
                    fetch(`${API_URL}/api/server/command`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({command: input.value})});
                    input.value = '';
                }
            }

            async function fetchPlayers() {
                const list = document.getElementById('player-list');
                if (!list) return;
                try {
                    const res = await fetch(`${API_URL}/api/server/players`);
                    const data = await res.json();
                    list.innerHTML = '';
                    if (data.error) { list.innerHTML = `<p class="col-span-full text-center text-red-500">${data.error}</p>`; return; }
                    if (data.players && data.players.length > 0) {
                        data.players.forEach(p => {
                            list.innerHTML += `<div class="player-card"><img src="${p.avatar}" class="player-avatar"><p class="font-bold text-white">${p.name}</p><div class="mt-4 flex justify-center gap-2"><button onclick="managePlayer('kick', '${p.name}')" class="bg-yellow-600 px-3 py-1 rounded text-xs font-bold text-white">Kick</button> <button onclick="managePlayer('ban', '${p.name}')" class="bg-red-600 px-3 py-1 rounded text-xs font-bold text-white">Ban</button></div></div>`;
                        });
                    } else { list.innerHTML = '<p class="col-span-full text-center text-gray-500">No hay jugadores conectados.</p>'; }
                } catch(e) { list.innerHTML = '<p class="col-span-full text-center text-red-500">Error al cargar jugadores.</p>'; }
            }

            window.managePlayer = async (action, name) => {
                if (!confirm(`¿Seguro que quieres '${action}' a ${name}?`)) return;
                await fetch(`${API_URL}/api/server/${action}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({player: name})});
                fetchPlayers();
            };

            window.loadFiles = async (dir) => {
                const tree = document.getElementById('file-tree');
                if (!tree) return;
                tree.innerHTML = '<p class="text-gray-500">Cargando...</p>';
                try {
                    const res = await fetch(`${API_URL}/api/files/list?path=${encodeURIComponent(dir)}`);
                    const files = await res.json();
                    tree.innerHTML = '';
                    if (dir !== '/') {
                        const pDir = dir.substring(0, dir.lastIndexOf('/')) || '/';
                        tree.innerHTML += `<div class="file-tree-item" onclick="window.loadFiles(atob('${btoa(pDir)}'))"><i data-feather="corner-up-left" class="w-4 h-4 text-gray-400"></i> <span class="text-sm text-gray-400">Volver</span></div>`;
                    }
                    files.sort((a,b) => a.isDir ? -1 : 1).forEach(f => {
                        const icon = f.isDir ? 'folder' : 'file';
                        const color = f.isDir ? 'text-green-500' : 'text-gray-300';
                        const action = f.isDir ? `window.loadFiles(atob('${btoa(f.path)}'))` : `window.openFile(atob('${btoa(f.path)}'))`;
                        tree.innerHTML += `<div class="file-tree-item" onclick="${action}"><i data-feather="${icon}" class="w-4 h-4 ${color}"></i> <span class="text-sm text-white">${f.name}</span></div>`;
                    });
                    feather.replace();
                } catch(e) { tree.innerHTML = '<p class="text-red-500">Error al cargar archivos.</p>'}
            };

            window.openFile = async (path) => {
                currentEditingFile = path;
                const editor = document.getElementById('file-editor');
                try {
                    const res = await fetch(`${API_URL}/api/files/content?path=${encodeURIComponent(path)}`);
                    const data = await res.json();
                    editor.value = data.content;
                } catch(e) { editor.value = "Error al abrir el archivo."}
            };

            async function saveFile() {
                if (!currentEditingFile) return;
                const editor = document.getElementById('file-editor');
                await fetch(`${API_URL}/api/files/save`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ path: currentEditingFile, content: editor.value }) });
                alert('Archivo guardado.');
            }

            async function handleRecreate(e) {
                e.preventDefault();
                if (!confirm('¡ATENCIÓN! Esto borrará tu mundo y recreará el Docker. ¿Proceder?')) return;
                alert('Recreando servidor con la nueva versión y el software elegido...');
            }
        });
    </script>
</body>
</html>
