        body { background: #0a0a0a; color: white; min-height: 100vh; overflow-x: hidden; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a3a1a 0%, #0a0a0a 100%); z-index: -1; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .input-pro { background: #161616; border: 1px solid #333; border-radius: 10px; color: white; padding: 12px; outline: none; transition: 0.3s; width: 100%; font-size: 14px; }

        .btn-crear { background: #4CAF50; color: white; font-weight: bold; padding: 15px; border-radius: 12px; transition: 0.3s; text-transform: uppercase; cursor: pointer; border: none; width: 100%; }
        .btn-crear:hover { background: #45a049; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(76,175,80,0.3); }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .loading-overlay.active { opacity: 1; pointer-events: all; }
        .spinner-ring { width: 100px; height: 100px; border: 4px solid rgba(76, 175, 80, 0.1); border-top-color: #4CAF50; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #version-section { transition: all 0.3s ease; }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg-wvhB7iaHOF5UOSsOOOz6le1ZutVmMM",
            authDomain: "proffesional-server.firebaseapp.com",
            projectId: "proffesional-server",
            storageBucket: "proffesional-server.firebasestorage.app",
            messagingSenderId: "833822850667",
            appId: "1:833822850667:web:3c03219c6822116edbfb2e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:3000' : '';

        // 🔥 LISTAS DINÁMICAS DE MOTORES 🔥
        const javaSoftwares = `
            <optgroup label="Vanilla">
                <option value="vanilla">Vanilla</option>
                <option value="snapshot">Snapshot</option>
            </optgroup>
            <optgroup label="Para Plugins">
                <option value="paper">Paper/Bukkit</option>
                <option value="spigot">Spigot/Bukkit</option>
                <option value="purpur">Purpur/Bukkit</option>
                <option value="glowstone">Glowstone</option>
            </optgroup>
            <optgroup label="Para Mods y más">
                <option value="fabric">Fabric</option>
                <option value="quilt">Quilt</option>
                <option value="neoforge">NeoForge</option>
                <option value="forge">Forge</option>
            </optgroup>
            <optgroup label="Para ambas (Plugins/Mods)">
                <option value="arclight">Arclight</option>
            </optgroup>
        `;

        const bedrockSoftwares = `
            <optgroup label="Vanilla">
                <option value="bedrock">Bedrock Oficial</option>
                <option value="preview">Bedrock Preview</option>
            </optgroup>
            <optgroup label="Para Plugins">
                <option value="pocketmine">PocketMine</option>
            </optgroup>
        `;

        const softwareSelect = document.getElementById('software-select');
        softwareSelect.innerHTML = javaSoftwares; // Carga inicial Java

        document.getElementById('server-edition').addEventListener('change', (e) => {
            const isBedrock = e.target.value === 'bedrock';
            softwareSelect.innerHTML = isBedrock ? bedrockSoftwares : javaSoftwares;
            document.getElementById('version-section').style.display = isBedrock ? 'none' : 'block';
            document.getElementById('bedrock-msg').style.display = isBedrock ? 'block' : 'none';
        });

        onAuthStateChanged(auth, async (user) => {
            if (!user) window.location.href = 'index.html';
            else loadUserServers(user.uid);
        });

        async function loadUserServers(uid) {
            try {
                const res = await fetch(`${API_URL}/api/project/check?uid=${uid}`);
                const data = await res.json();
                const list = document.getElementById('servers-list-container');
                if (data.exists && data.servers.length > 0) {
                    let html = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">';
                    data.servers.forEach(s => {
                        const versionLabel = s.edition === 'bedrock' ? s.software.toUpperCase() : s.version;
                        html += `
                        <div class="glass p-5 flex flex-col justify-between">
                            <div>
                                <h4 class="font-bold text-white text-lg">${s.projectName}</h4>
                                <p class="text-xs text-gray-400 mb-4">${s.edition.toUpperCase()} - ${versionLabel}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="window.enterServer('${encodeURIComponent(JSON.stringify(s))}')" class="bg-green-600 hover:bg-green-500 transition-colors px-4 py-2 rounded text-xs font-bold text-white flex-1">ENTRAR</button>
                                <button onclick="window.deleteServer('${s.id}')" class="bg-[#222] border border-[#333] hover:bg-red-600 transition-colors px-3 py-2 rounded text-xs text-white" title="Borrar Servidor"><i data-feather="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>`;
                    });
                    list.innerHTML = html + '</div><hr class="border-[#333] my-8">';
                }
                feather.replace();
            } catch (e) { console.error(e); }
        }

        window.enterServer = (s) => { 
            sessionStorage.setItem('selectedServer', decodeURIComponent(s)); 
            window.location.href = 'index.html'; 
        };

        window.deleteServer = async (id) => {
            if (!confirm('¿Eliminar servidor permanentemente?')) return;
            await fetch(`${API_URL}/api/project/delete`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ uid: auth.currentUser.uid, serverId: id }) });
            window.location.reload();
        };

        document.getElementById('view-create').onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('loading-overlay').classList.add('active');
            
            const edition = document.getElementById('server-edition').value;
            const payload = {
                uid: auth.currentUser.uid,
                projectName: document.getElementById('custom-name').value,
                motd: "Professional Server",
                edition: edition,
                software: document.getElementById('software-select').value,
                version: edition === 'java' ? document.getElementById('mc-version-select').value : 'LATEST'
            };

            await fetch(`${API_URL}/api/project/create`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            setTimeout(() => window.location.reload(), 3000);
        };
        feather.replace();
    </script>
