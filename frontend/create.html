<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desplegar Servidor | Professional Servers V2.6</title>
    <link rel="icon" type="image/x-icon" href="./assets/img/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Poppins', sans-serif; 
        }
        body { 
            background: #0a0a0a; 
            color: white; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }
        .bg-glow { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: radial-gradient(circle at 50% 50%, #1a3a1a 0%, #0a0a0a 100%); 
            z-index: -1; 
        }
        .glass { 
            background: rgba(20, 20, 20, 0.8); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px; 
        }
        .input-pro { 
            background: #161616; 
            border: 1px solid #333; 
            border-radius: 10px; 
            color: white; 
            padding: 12px; 
            outline: none; 
            transition: 0.3s; 
            width: 100%; 
            font-size: 14px;
        }
        .input-pro:focus { 
            border-color: #4CAF50; 
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.2); 
            background: #1a1a1a;
        }
        .btn-crear { 
            background: #4CAF50; 
            color: white; 
            font-weight: bold; 
            padding: 15px; 
            border-radius: 12px; 
            transition: 0.3s; 
            text-transform: uppercase; 
            cursor: pointer; 
            border: none; 
            width: 100%; 
        }
        .btn-crear:hover { 
            background: #45a049; 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(76,175,80,0.3); 
        }
        .btn-crear:disabled { 
            opacity: 0.5; 
            cursor: not-allowed; 
            transform: none; 
        }
        .version-badge { 
            background: rgba(76, 175, 80, 0.1); 
            color: #4CAF50; 
            border: 1px solid #4CAF50; 
            padding: 4px 10px; 
            border-radius: 8px; 
            font-size: 11px; 
            font-weight: bold; 
        }
        .glowing-text { 
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.5); 
        }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .spinner-container {
            position: relative;
            width: 100px;
            height: 100px;
        }
        .spinner-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid rgba(76, 175, 80, 0.1);
            border-top-color: #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .spinner-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #4CAF50;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="max-w-5xl mx-auto p-6 pt-12">
        <div class="flex flex-col md:flex-row items-center justify-between mb-10 gap-4">
            <div class="flex items-center gap-4">
                <img src="./assets/img/favicon.ico" class="w-14 h-14 object-contain drop-shadow-[0_0_12px_rgba(76,175,80,0.5)]" onerror="this.src='./assets/img/logo-minecraft.ico'">
                <div>
                    <h1 class="text-3xl font-bold font-['Cinzel'] tracking-wider text-white">NUEVO PROYECTO</h1>
                    <p class="text-xs text-green-500 font-bold uppercase tracking-widest glowing-text">Infraestructura V2.6 Beta</p>
                </div>
            </div>
            <button onclick="window.location.href='index.html'" class="text-xs text-gray-400 hover:text-white transition-colors uppercase font-bold flex items-center gap-2 bg-[#111] hover:bg-[#222] border border-[#333] px-4 py-2 rounded-lg">
                <i data-feather="arrow-left" class="w-4 h-4"></i> Volver al Panel
            </button>
        </div>

        <form id="view-create" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="glass p-8 space-y-6">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-6 flex items-center gap-2 border-b border-[#333] pb-3">
                    <i data-feather="info" class="w-4 h-4 text-indigo-400"></i> Identidad del Servidor
                </h3>
                
                <div class="space-y-2">
                    <label class="text-xs text-gray-500 uppercase font-bold">Nombre del Proyecto</label>
                    <input type="text" id="custom-name" class="input-pro" placeholder="Ej: Mi Mundo Survival" required>
                </div>

                <div class="space-y-2">
                    <label class="text-xs text-gray-500 uppercase font-bold">MOTD (Mensaje de Bienvenida)</label>
                    <input type="text" id="custom-motd" class="input-pro" placeholder="Bienvenido a Professional Servers" required>
                </div>

                <div class="space-y-2">
                    <label class="text-xs text-gray-500 uppercase font-bold">Edición del Juego</label>
                    <select id="server-edition" class="input-pro">
                        <option value="java">Java Edition (PC)</option>
                        <option value="bedrock">Bedrock Edition (Consolas/Mobile)</option>
                    </select>
                </div>
            </div>

            <div class="glass p-8 space-y-6 flex flex-col justify-between">
                <div>
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-6 flex items-center gap-2 border-b border-[#333] pb-3">
                        <i data-feather="cpu" class="w-4 h-4 text-green-400"></i> Núcleo & Versión
                    </h3>

                    <div class="space-y-2 mb-6">
                        <label class="text-xs text-gray-500 uppercase font-bold">Software / Motor</label>
                        <select id="software-select" class="input-pro">
                            <optgroup label="Oficial">
                                <option value="vanilla">Vanilla (Oficial de Mojang)</option>
                            </optgroup>
                            <optgroup label="Mods">
                                <option value="forge">Forge (Soporte para Modpacks)</option>
                                <option value="fabric">Fabric (Mods ligeros y rápidos)</option>
                                <option value="quilt">Quilt (Alternativa a Fabric)</option>
                            </optgroup>
                            <optgroup label="Plugins & Rendimiento">
                                <option value="paper">Paper (Optimizado + Plugins)</option>
                                <option value="purpur">Purpur (Máximo Rendimiento + Plugins)</option>
                                <option value="spigot">Spigot (Clásico para Plugins)</option>
                            </optgroup>
                            <optgroup label="Redes (Proxies)">
                                <option value="velocity">Velocity (Proxy Moderno y Rápido)</option>
                                <option value="bungeecord">BungeeCord (Proxy Clásico)</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs text-gray-500 uppercase font-bold flex justify-between items-center">
                            <span>Versión de Minecraft</span>
                            <span id="version-count" class="text-[10px] text-green-500 bg-[#111] px-2 py-1 rounded border border-[#333]">Cargando red de Mojang...</span>
                        </label>
                        <select id="mc-version-select" class="input-pro">
                            <option value="">Conectando con Mojang API...</option>
                        </select>
                    </div>
                </div>

                <div class="pt-6 mt-6 border-t border-[#333]">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs text-gray-400 uppercase font-bold">Recursos Asignados Automáticamente</span>
                        <span class="version-badge">8 GB RAM (PRO)</span>
                    </div>
                    <button type="submit" class="btn-crear flex items-center justify-center gap-3" id="btn-submit-create">
                        <i data-feather="zap" class="w-5 h-5"></i> DESPLEGAR SERVIDOR AHORA
                    </button>
                </div>
            </div>
        </form>

        <div id="loading-overlay" class="loading-overlay">
            <div class="spinner-container">
                <div class="spinner-ring"></div>
                <i data-feather="server" class="spinner-icon w-8 h-8"></i>
            </div>
            <h2 class="mt-8 text-2xl font-bold font-['Cinzel'] tracking-widest text-white">CONFIGURANDO NODO</h2>
            <p id="status-msg" class="mt-3 text-xs text-green-400 uppercase tracking-[0.2em] font-bold glowing-text">Descargando núcleo y asignando 8GB RAM...</p>
            
            <div class="w-64 bg-[#222] rounded-full h-1 mt-6 overflow-hidden">
                <div class="bg-green-500 h-1 rounded-full animate-pulse w-full"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAg-wvhB7iaHOF5UOSsOOOz6le1ZutVmMM",
            authDomain: "proffesional-server.firebaseapp.com",
            projectId: "proffesional-server",
            storageBucket: "proffesional-server.firebasestorage.app",
            messagingSenderId: "833822850667",
            appId: "1:833822850667:web:3c03219c6822116edbfb2e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // DEJAR VACÍO PARA PRODUCCIÓN/NGINX
        const API_URL = ""; 

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = 'index.html';
        });

        // 🔥 OBTENER TODAS LAS VERSIONES DIRECTO DE MOJANG 🔥
        async function loadMinecraftVersions() {
            const select = document.getElementById('mc-version-select');
            const countLabel = document.getElementById('version-count');
            
            try {
                // Fetch a la API oficial de Mojang
                const res = await fetch('https://launchermeta.mojang.com/mc/game/version_manifest.json');
                const data = await res.json();
                
                // Filtramos solo las versiones "release" (estables)
                const releaseVersions = data.versions.filter(v => v.type === 'release');
                
                // Limpiamos el select
                select.innerHTML = '';
                
                // Llenamos el select con todas las versiones
                releaseVersions.forEach((v, index) => {
                    const option = document.createElement('option');
                    option.value = v.id;
                    // Le ponemos una marca a la última versión
                    if (v.id === data.latest.release) {
                        option.textContent = `${v.id} (Última Estable)`;
                        option.selected = true; // La seleccionamos por defecto
                    } else {
                        option.textContent = v.id;
                    }
                    select.appendChild(option);
                });
                
                countLabel.innerText = `${releaseVersions.length} VERSIONES LISTAS`;
                countLabel.classList.remove('text-green-500');
                countLabel.classList.add('text-indigo-400');
                
            } catch (e) {
                // Fallback por si Mojang está caído
                select.innerHTML = `
                    <option value="1.21">1.21</option>
                    <option value="1.20.4">1.20.4</option>
                    <option value="1.19.4">1.19.4</option>
                    <option value="1.18.2">1.18.2</option>
                    <option value="1.16.5">1.16.5</option>
                    <option value="1.12.2">1.12.2</option>
                    <option value="1.8.9">1.8.9</option>
                `;
                countLabel.innerText = "MODO OFFLINE (API CAÍDA)";
                countLabel.classList.replace('text-green-500', 'text-red-500');
            }
        }

        // LÓGICA DE CREACIÓN (ANTI-CRASHEOS)
        document.getElementById('view-create').onsubmit = async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btn-submit-create');
            const overlay = document.getElementById('loading-overlay');
            const statusMsg = document.getElementById('status-msg');
            
            btn.disabled = true;
            overlay.classList.add('active'); // Mostramos la pantalla de carga
            
            const payload = {
                uid: auth.currentUser.uid,
                projectName: document.getElementById('custom-name').value,
                motd: document.getElementById('custom-motd').value,
                edition: document.getElementById('server-edition').value,
                software: document.getElementById('software-select').value,
                version: document.getElementById('mc-version-select').value
            };

            // Simular pasos de carga para el usuario
            setTimeout(() => { statusMsg.innerText = "PREPARANDO ENTORNO DOCKER..."; }, 1500);
            setTimeout(() => { statusMsg.innerText = "LEVANTANDO TÚNEL PLAYIT.GG..."; }, 3000);

            try {
                // Mandamos la orden al Backend
                const res = await fetch(`${API_URL}/api/project/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // Leemos el texto crudo primero. Si el panel tardó, Ngrok puede mandar un HTML de error de timeout.
                // Nosotros ignoramos ese error visual y confiamos en que el contenedor se está creando igual.
                const textResponse = await res.text();
                
                statusMsg.innerText = "¡INSTANCIA CREADA! REDIRIGIENDO...";
                statusMsg.classList.replace('text-green-400', 'text-white');
                
                // Actualizamos la lista local de servidores pidiéndole al backend
                try {
                    const checkRes = await fetch(`${API_URL}/api/project/check?uid=${auth.currentUser.uid}`);
                    const checkData = await checkRes.json();
                    
                    if (checkData.servers && checkData.servers.length > 0) {
                        // Agarramos el último servidor creado (que debería ser el nuestro)
                        const newServer = checkData.servers[checkData.servers.length - 1];
                        sessionStorage.setItem('selectedServer', JSON.stringify(newServer));
                    }
                } catch(e) {
                    console.log("No se pudo obtener el ID del servidor al instante, cargará el inicio por defecto.");
                }

                // Redirigimos al panel
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } catch (err) {
                // Si hay un error de red puro (CORS o caída del panel)
                console.error("Error al crear:", err);
                statusMsg.innerText = "EL SERVIDOR SE ESTÁ CREANDO EN SEGUNDO PLANO...";
                statusMsg.classList.replace('text-green-400', 'text-yellow-400');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);
            }
        };

        // Inicializamos los íconos y cargamos las versiones
        feather.replace();
        loadMinecraftVersions();
    </script>
</body>
</html>
