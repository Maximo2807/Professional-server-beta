<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Servidores | Professional Servers</title>
    <link rel="icon" type="image/x-icon" href="./assets/img/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { position: relative; width: 100%; min-height: 100vh; background: url('./assets/img/dashboard-bg.jpeg') center/cover no-repeat fixed; display: flex; align-items: center; justify-content: center; color: white; padding: 20px; }
        .db-bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); z-index: 0; }
        .caja-config { background: rgba(20, 20, 20, 0.9); border: 1px solid rgba(255,255,255,0.08); border-radius: 15px; padding: 40px; position: relative; z-index: 10; width: 100%; max-width: 750px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .titulo-container { text-align: center; margin-bottom: 30px; display: flex; flex-direction: column; align-items: center;}
        .titulo-pro { font-family: 'Press Start 2P', cursive; font-size: 16px; color: #4CAF50; display: block; margin-bottom: 8px;}
        .titulo-servers { font-family: 'Cinzel', serif; font-size: 24px; color: white; display: block; font-weight: bold; letter-spacing: 1px;}
        .mod-pills-tab { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center;}
        .mod-pill { padding: 10px 20px; border-radius: 8px; background: #161616; border: 1px solid #333; color: #aaa; font-size: 12px; cursor: pointer; transition: 0.2s; text-transform: uppercase; font-weight: bold; display: flex; align-items: center; gap: 8px;}
        .mod-pill:hover { background: #222; border-color: #555; }
        .mod-pill.active { background: rgba(76, 175, 80, 0.15); color: #4CAF50; border-color: #4CAF50; }
        .mc-server-card { background: #0f0f0f; border: 1px solid #333; border-radius: 12px; padding: 25px; display: flex; gap: 20px; margin-bottom: 25px; align-items: center;}
        .mc-icon { width: 70px; height: 70px; border-radius: 8px; border: 1px solid #444; object-fit: contain; padding: 2px; background: #000; box-shadow: 0 0 15px rgba(76, 175, 80, 0.2);}
        .mc-info { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .mc-ip-container { display: flex; align-items: center; gap: 8px; }
        .mc-ip-input { background: #1a1a1a; border: 1px solid #333; color: white; font-size: 14px; font-weight: bold; outline: none; padding: 10px 15px; border-radius: 8px; width: 100%; transition: 0.3s;}
        .mc-ip-input:focus { border-color: #4CAF50; }
        .mc-motd-input { background: #1a1a1a; border: 1px solid #333; color: #aaa; font-size: 12px; outline: none; padding: 10px 15px; border-radius: 8px; width: 100%; font-family: monospace; transition: 0.3s;}
        .mc-motd-input:focus { border-color: #4CAF50; color: white;}
        .grupo-input { margin-bottom: 20px; width: 100%; }
        .grupo-input label { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #888; margin-bottom: 8px; text-transform: uppercase; font-weight: 600; letter-spacing: 1px;}
        .grupo-input select { width: 100%; padding: 14px; background: #161616; border: 1px solid #333; border-radius: 8px; color: white; outline: none; transition: 0.3s; font-size: 13px; }
        .grupo-input select:focus { border-color: #4CAF50; background: #1a1a1a; }
        .btn-crear { width: 100%; padding: 16px; background: #4CAF50; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; text-transform: uppercase; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; box-shadow: 0 0 15px rgba(76,175,80,0.3); }
        .btn-crear:hover:not(:disabled) { background: #45a049; transform: scale(1.02); }
        .btn-crear:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-logout { position: absolute; top: 20px; right: 20px; z-index: 100; background: #ef4444; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s;}
        .btn-logout:hover { background: #dc2626; }
        .glowing-text { text-shadow: 0 0 15px rgba(76, 175, 80, 0.5); }
    </style>
</head>
<body>
    
    <div class="db-bg-overlay"></div>

    <button id="btn-logout-create" class="btn-logout">
        <i data-feather="log-out" class="w-4 h-4"></i> Cerrar Sesión
    </button>
    
    <div id="checking-status" class="caja-config text-center flex flex-col items-center justify-center py-20">
        <i data-feather="loader" class="animate-spin text-green-500 w-12 h-12 mb-4"></i>
        <p class="text-sm text-gray-400 uppercase tracking-widest font-bold">Cargando Hub de Servidores...</p>
    </div>

    <div id="view-list" class="caja-config hidden">
        <div class="titulo-container">
            <span class="titulo-pro">Hub Principal</span>
            <span class="titulo-servers">Mis Servidores</span>
        </div>
        <p class="text-center text-gray-400 mb-6 text-sm">Selecciona tu servidor para ingresar al panel de control.</p>
        
        <div id="servers-list-container" class="flex flex-col gap-4 mb-6">
            </div>
        
        <button id="btn-show-create" class="w-full py-4 bg-[#1a1a1a] text-white hover:border-[#4CAF50] hover:text-[#4CAF50] rounded-lg transition-colors text-sm font-bold border-2 border-dashed border-[#333] flex items-center justify-center gap-2">
            <i data-feather="plus-circle" class="w-5 h-5"></i> CREAR NUEVO SERVIDOR
        </button>
        <button id="btn-limit-reached" class="hidden w-full py-4 bg-[#111] text-gray-600 rounded-lg cursor-not-allowed text-sm font-bold border border-[#222]">
            LÍMITE ALCANZADO (PLAN FREE: 2/2)
        </button>
    </div>

    <form id="view-create" class="caja-config hidden">
        <div class="mb-6">
            <button type="button" id="btn-volver-lista" class="text-gray-400 hover:text-white flex items-center gap-2 text-sm font-bold uppercase transition-colors">
                <i data-feather="arrow-left" class="w-4 h-4"></i> Volver a Mis Servidores
            </button>
        </div>

        <div class="titulo-container">
            <div class="flex items-center justify-center gap-4 mb-4">
                <img src="./assets/img/favicon.ico" alt="Logo" class="w-12 h-12 object-contain drop-shadow-[0_0_12px_rgba(76,175,80,0.5)]">
            </div>
            <span class="titulo-pro">Nueva Infraestructura</span>
            <span class="titulo-servers">Configuración Inicial</span>
        </div>

        <p class="text-center text-gray-400 mb-8 text-sm">Elige la plataforma y personaliza los detalles de tu nuevo servidor.</p>

        <div class="mod-pills-tab">
            <div class="mod-pill active" data-edition="java"><i data-feather="monitor" class="w-4 h-4"></i> Java Edition</div>
            <div class="mod-pill" data-edition="bedrock"><i data-feather="smartphone" class="w-4 h-4"></i> Bedrock Edition</div>
            <input type="hidden" id="server-edition" value="java">
        </div>

        <div class="mc-server-card">
            <img src="./assets/img/logo-minecraft.ico" class="mc-icon" alt="Icono">
            <div class="mc-info">
                <div class="mc-ip-container">
                    <input type="text" id="custom-name" class="mc-ip-input" placeholder="Ej: Mi Servidor Survival" maxlength="30" required>
                </div>
                <div class="flex items-center w-full">
                    <input type="text" id="custom-motd" class="mc-motd-input" value="¡Bienvenido a mi servidor en Professional Servers!" maxlength="60" required>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="grupo-input">
                <label><i data-feather="layers" class="w-3 h-3"></i> Software Base</label>
                <select id="software-select">
                    <option value="Vanilla">Vanilla (Oficial)</option>
                    <option value="Paper">Paper (Recomendado / Plugins)</option>
                    <option value="Forge">Forge (Mods)</option>
                </select>
            </div>
            <div class="grupo-input">
                <label><i data-feather="git-branch" class="w-3 h-3"></i> Versión</label>
                <select id="mc-version-select" required>
                    <option value="">Cargando versiones...</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn-crear"><i data-feather="play-circle" class="w-5 h-5"></i> INICIAR DESPLIEGUE</button>
    </form>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        
        const firebaseConfig = { 
            apiKey: "AIzaSyAg-wvhB7iaHOF5UOSsOOOz6le1ZutVmMM", 
            authDomain: "proffesional-server.firebaseapp.com", 
            projectId: "proffesional-server", 
            storageBucket: "proffesional-server.firebasestorage.app", 
            messagingSenderId: "833822850667", 
            appId: "1:833822850667:web:3c03219c6822116edbfb2e", 
            measurementId: "G-8SZ528Y5NZ" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const API_URL = "https://craziness-showcase-stamina.ngrok-free.dev";

        feather.replace();

        document.getElementById('btn-logout-create').addEventListener('click', () => {
            signOut(auth).then(() => {
                sessionStorage.removeItem('selectedServer');
                window.location.href = 'index.html';
            });
        });

        // LÓGICA DEL HUB: MOSTRAR LISTA Y CARGAR TARJETAS
        onAuthStateChanged(auth, async (user) => { 
            if (!user) { window.location.href = 'index.html'; return; }
            
            try {
                const res = await fetch(`${API_URL}/api/project/check?uid=${user.uid}`);
                if(res.ok) {
                    const data = await res.json();
                    document.getElementById('checking-status').classList.add('hidden');
                    
                    if (data.exists && data.servers.length > 0) {
                        document.getElementById('view-list').classList.remove('hidden');
                        renderizarServidores(data.servers);
                    } else {
                        // Si no tiene NINGÚN servidor, pasamos directo al creador
                        document.getElementById('view-create').classList.remove('hidden');
                        document.getElementById('btn-volver-lista').classList.add('hidden'); // No puede volver si no tiene servers
                    }
                } else {
                    document.getElementById('checking-status').classList.add('hidden');
                    document.getElementById('view-create').classList.remove('hidden');
                }
            } catch(e) {
                document.getElementById('checking-status').classList.add('hidden');
                document.getElementById('view-create').classList.remove('hidden');
            }
        });

        function renderizarServidores(servers) {
            const container = document.getElementById('servers-list-container');
            container.innerHTML = '';
            
            servers.forEach(srv => {
                // Generamos la tarjeta para cada servidor
                container.innerHTML += `
                <div class="bg-[#111] border border-[#333] rounded-xl p-4 flex items-center justify-between transition-all hover:border-[#4CAF50] group">
                    
                    <div class="flex items-center gap-4 cursor-pointer flex-1" onclick="entrarServer('${srv.id}')">
                        <img src="./assets/img/logo-minecraft.ico" class="w-14 h-14 rounded object-cover border border-[#444] group-hover:border-[#4CAF50] transition-colors">
                        <div>
                            <h3 class="text-white font-bold text-lg leading-tight group-hover:text-[#4CAF50] transition-colors">${srv.projectName}</h3>
                            <p class="text-gray-400 text-xs font-mono mt-1 line-clamp-1">${srv.motd}</p>
                            <span class="text-[9px] bg-[#222] border border-[#444] text-[#ccc] px-2 py-1 rounded mt-2 inline-block uppercase font-bold tracking-wider">${srv.software} ${srv.version}</span>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-2 border-l border-[#333] pl-4 ml-4">
                        <button onclick="entrarServer('${srv.id}')" class="bg-green-600 hover:bg-green-500 text-white p-3 rounded-lg transition-colors" title="Entrar al Panel">
                            <i data-feather="arrow-right" class="w-4 h-4"></i>
                        </button>
                        <button onclick="eliminarServer('${srv.id}')" class="bg-[#1a1a1a] hover:bg-red-600 text-gray-500 hover:text-white p-3 rounded-lg transition-colors border border-[#333] hover:border-red-600" title="Eliminar Servidor">
                            <i data-feather="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>

                </div>`;
            });
            
            window.serversData = servers;
            feather.replace();

            // Control del límite de 2 servidores
            if (servers.length >= 2) {
                document.getElementById('btn-show-create').classList.add('hidden');
                document.getElementById('btn-limit-reached').classList.remove('hidden');
            } else {
                document.getElementById('btn-show-create').classList.remove('hidden');
                document.getElementById('btn-limit-reached').classList.add('hidden');
            }
        }

        // FUNCIONES GLOBALES PARA LOS BOTONES DE LAS TARJETAS
        window.entrarServer = (id) => {
            const srv = window.serversData.find(s => s.id === id);
            sessionStorage.setItem('selectedServer', JSON.stringify(srv));
            window.location.href = 'index.html';
        };

        window.eliminarServer = async (id) => {
            if(!confirm("¿ESTÁS SEGURO? Se eliminará este servidor y todo el progreso para siempre.")) return;
            try {
                await fetch(`${API_URL}/api/project/delete`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ uid: auth.currentUser.uid, serverId: id })
                });
                window.location.reload();
            } catch(e) { alert("Error al eliminar."); }
        };

        // NAVEGACIÓN ENTRE VISTAS
        document.getElementById('btn-show-create').addEventListener('click', () => {
            document.getElementById('view-list').classList.add('hidden');
            document.getElementById('view-create').classList.remove('hidden');
            document.getElementById('btn-volver-lista').classList.remove('hidden');
        });

        document.getElementById('btn-volver-lista').addEventListener('click', () => {
            document.getElementById('view-create').classList.add('hidden');
            document.getElementById('view-list').classList.remove('hidden');
        });

        // FORMULARIO DE CREACIÓN LÓGICA MOD PILLS
        const tabs = document.querySelectorAll('.mod-pill');
        const editionInput = document.getElementById('server-edition');
        const softwareSelect = document.getElementById('software-select');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const edition = tab.getAttribute('data-edition');
                editionInput.value = edition;

                if (edition === 'bedrock') {
                    softwareSelect.innerHTML = `<option value="Bedrock">Bedrock Dedicated Server</option><option value="Pocketmine">Pocketmine (Plugins)</option>`;
                } else {
                    softwareSelect.innerHTML = `<option value="Vanilla">Vanilla (Oficial)</option><option value="Paper">Paper (Recomendado / Plugins)</option><option value="Forge">Forge (Mods)</option>`;
                }
            });
        });

        async function loadMinecraftVersions() {
            const select = document.getElementById('mc-version-select');
            try {
                const res = await fetch('https://launchermeta.mojang.com/mc/game/version_manifest.json');
                const data = await res.json();
                let html = '';
                data.versions.slice(0, 50).forEach(v => { 
                    if(v.type === 'release') html += `<option value="${v.id}">${v.id}</option>`; 
                });
                select.innerHTML = html;
            } catch(e) { select.innerHTML = '<option value="1.20.4">1.20.4</option>'; }
        }
        loadMinecraftVersions();

        document.getElementById('view-create').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('.btn-crear');
            btn.innerHTML = `<i data-feather="loader" class="w-5 h-5 animate-spin"></i> PREPARANDO CONTENEDORES...`;
            btn.disabled = true;
            feather.replace();

            const user = auth.currentUser;
            const customName = document.getElementById('custom-name').value.trim();
            
            const payload = {
                uid: user.uid,
                edition: editionInput.value,
                motd: document.getElementById('custom-motd').value.trim(),
                address: customName,
                software: document.getElementById('software-select').value,
                version: document.getElementById('mc-version-select').value
            };

            try {
                const res = await fetch(`${API_URL}/api/project/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (data.success) {
                    window.location.reload(); 
                } else { throw new Error(data.error); }
            } catch (err) {
                alert("Error al crear el proyecto: " + err.message);
                btn.innerHTML = `<i data-feather="play-circle" class="w-5 h-5"></i> INICIAR DESPLIEGUE`;
                btn.disabled = false;
                feather.replace();
            }
        });
    </script>
</body>
</html>
