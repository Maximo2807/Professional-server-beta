<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planes | Professional Servers</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0a0a0a; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .bg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(30,30,30,1) 0%, rgba(10,10,10,1) 100%); z-index: -1; }
        .glowing-text { text-shadow: 0 0 15px rgba(76, 175, 80, 0.5); }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="z-10 text-center flex flex-col items-center">
        <i data-feather="tool" class="text-green-500 w-20 h-20 mb-6 animate-pulse"></i>
        <h1 class="text-4xl font-['Cinzel'] font-bold mb-2 glowing-text">Sección en Construcción</h1>
        <p class="text-gray-400 mb-8 max-w-md">Nuestros ingenieros están preparando los mejores planes de alojamiento para la V2.5 BETA. ¡Vuelve pronto!</p>
        <button onclick="window.history.back()" class="bg-green-600 hover:bg-green-700 transition-colors px-8 py-3 rounded-lg font-bold text-white uppercase tracking-wider shadow-lg shadow-green-900/50 flex items-center gap-2">
            <i data-feather="arrow-left" class="w-4 h-4"></i> Volver al Panel
        </button>
    </div>
    <script>feather.replace();</script>
</body>
</html>
